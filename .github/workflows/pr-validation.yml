name: PR Validation

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  APP_TEST_PROJECT: tests/PrompterOne.Web.Tests/PrompterOne.Web.Tests.csproj
  CORE_TEST_PROJECT: tests/PrompterOne.Core.Tests/PrompterOne.Core.Tests.csproj
  PLAYWRIGHT_CLI: tests/PrompterOne.Web.UITests/bin/Debug/net10.0/.playwright/package/cli.js
  SOLUTION_FILE: PrompterOne.slnx
  UI_TEST_PROJECT: tests/PrompterOne.Web.UITests/PrompterOne.Web.UITests.csproj

jobs:
  build_supporting_suites:
    name: Restore + Build Supporting Suites
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore solution
        run: dotnet restore "$SOLUTION_FILE"

      - name: Build solution
        run: dotnet build "$SOLUTION_FILE" -warnaserror

  test_supporting_suites:
    name: Run Supporting Suites
    needs: build_supporting_suites
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Test supporting suites
        run: |
          dotnet test --project "$CORE_TEST_PROJECT"
          dotnet test --project "$APP_TEST_PROJECT"

  build_browser_suite:
    name: Restore + Build Browser Suite
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore solution
        run: dotnet restore "$SOLUTION_FILE"

      - name: Build solution
        run: dotnet build "$SOLUTION_FILE" -warnaserror

  test_browser_suite:
    name: Run Browser Suite
    needs: build_browser_suite
    runs-on: macos-latest

    env:
      BROWSER_TEST_LOG_DIR: output/test-results/browser-suite
      BROWSER_TEST_LOG_PATH: output/test-results/browser-suite/browser-suite.log

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore solution
        run: dotnet restore "$SOLUTION_FILE"

      - name: Build solution
        run: dotnet build "$SOLUTION_FILE" -warnaserror

      - name: Install Playwright browser
        run: node "$PLAYWRIGHT_CLI" install chromium

      - name: Test browser suite
        id: browser_tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p "$BROWSER_TEST_LOG_DIR"
          dotnet test --project "$UI_TEST_PROJECT" --verbosity normal 2>&1 | tee "$BROWSER_TEST_LOG_PATH"

      - name: Summarize browser suite
        if: always()
        shell: bash
        env:
          BROWSER_TEST_OUTCOME: ${{ steps.browser_tests.outcome }}
        run: |
          bash ./scripts/ci/write-browser-suite-summary.sh \
            "$BROWSER_TEST_LOG_PATH" \
            "$BROWSER_TEST_OUTCOME" \
            "Run Browser Suite" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload browser test logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: browser-test-logs-pr-validation
          path: ${{ env.BROWSER_TEST_LOG_DIR }}
          if-no-files-found: ignore

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts-pr-validation
          path: output/playwright/
          if-no-files-found: ignore
